<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CutiS - AI-powered skin analysis providing educational insights about your skin" />
    <meta name="theme-color" content="#6366f1" />
    <title>CutiS</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --secondary: #8b5cf6;
        --success: #10b981;
        --warning: #f59e0b;
        --error: #ef4444;
        --background: #f8fafc;
        --surface: #ffffff;
        --border: #e2e8f0;
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --text-muted: #94a3b8;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: var(--background);
        color: var(--text-primary);
        line-height: 1.6;
      }

      #app { min-height: 100vh; position: relative; }

      .initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 1.5rem;
        background: var(--background);
        transition: opacity 0.4s ease;
      }

      .initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loader-logo {
        width: 48px;
        height: 48px;
        animation: loaderPulse 1.5s ease-in-out infinite;
      }

      .loader-logo svg {
        width: 100%;
        height: 100%;
      }

      .loader-bar {
        width: 120px;
        height: 3px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
      }

      .loader-bar-fill {
        height: 100%;
        width: 30%;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        border-radius: 99px;
        animation: loaderSlide 1.2s ease-in-out infinite;
      }

      .loader-text {
        color: var(--text-muted);
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      @keyframes loaderPulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
      }

      @keyframes loaderSlide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(430%); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="initial-loader" id="initial-loading">
        <div class="loader-logo">
          <svg viewBox="0 0 32 32" fill="none">
            <defs>
              <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#6366f1" />
                <stop offset="100%" stop-color="#8b5cf6" />
              </linearGradient>
            </defs>
            <rect width="32" height="32" rx="8" fill="url(#lg)" />
            <circle cx="16" cy="16" r="9" fill="none" stroke="white" stroke-width="1.8" />
            <path d="M11 16.5c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="white" stroke-width="1.5" stroke-linecap="round" />
            <path d="M13 17c0-1.7 1.3-3 3-3s3 1.3 3 3" stroke="white" stroke-width="1.3" stroke-linecap="round" />
            <circle cx="16" cy="18.5" r="1.5" fill="white" opacity="0.9" />
          </svg>
        </div>
        <div class="loader-bar">
          <div class="loader-bar-fill"></div>
        </div>
        <span class="loader-text">Loading CutiS…</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
